<style>

* { margin:0; padding:0; box-sizing:border-box; }

body{
font-family:'Press Start 2P', monospace;
color:#00ff00;
text-align:center;
padding-top:100px;
background-color:#0e0e0e;
overflow-x:hidden;
}

header{
font-size:4em;
margin-bottom:40px;
color:#39ff14;
text-shadow:0 0 5px #39ff14,0 0 10px #39ff14,0 0 20px #00ffcc,0 0 40px #00ffcc;
animation:neonGlow 2s infinite alternate;
font-family:'Orbitron', sans-serif;
letter-spacing:2px;
}

@keyframes neonGlow{
from{ text-shadow:0 0 5px #39ff14,0 0 10px #00ffcc;}
to{ text-shadow:0 0 20px #00ffcc,0 0 40px #39ff14;}
}

.fade-in{
opacity:0;
transform:translateY(20px);
animation:fadeInMove 1s forwards;
}

@keyframes fadeInMove{
to{ opacity:1; transform:translateY(0);}
}

.retro-button{
font-family:'Press Start 2P', monospace;
background:linear-gradient(to right,#ff0000,#00ff00);
border:2px solid #fff;
color:black;
padding:25px 50px;
font-size:1.2em;
text-transform:uppercase;
box-shadow:0 0 20px #ff0000,0 0 30px #00ff00;
transition:.3s;
cursor:pointer;
margin:20px 0;
}

.retro-button:hover{
background:black;
color:#00ff00;
box-shadow:0 0 40px #ff0000;
}

.square-button{
display:inline-flex;
justify-content:center;
align-items:center;
width:220px;
height:220px;
margin:30px auto;
font-family:'Orbitron', sans-serif;
font-size:1.1em;
text-decoration:none;
color:black;
background:linear-gradient(135deg,#00ff00,#ff0000);
border:3px solid white;
box-shadow:0 0 25px #00ff00,0 0 35px #ff0000;
transition:.3s;
}

.square-button:hover{
background:black;
color:#00ff00;
box-shadow:0 0 50px #ff0000;
transform:scale(1.05);
}

/* NOWA SEKCJA SPOTIFY */

.spotify-section{
max-width:900px;
margin:60px auto;
padding:20px;
}

.spotify-embeds{
display:flex;
flex-direction:column;
gap:30px;
margin-bottom:30px;
}

/* SOCIAL MENU */

.social-menu{
position:fixed;
top:50%;
left:0;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:0 10px 10px 0;
width:60px;
transition:width .3s;
display:flex;
flex-direction:column;
gap:15px;
}

.social-menu:hover{ width:260px;}

.social-menu a{
display:flex;
align-items:center;
color:#00ff00;
font-size:1.2em;
padding:10px;
text-decoration:none;
}

.social-menu a::after{
content:attr(aria-label);
margin-left:10px;
opacity:0;
transition:.3s;
}

.social-menu:hover a::after{
opacity:1;
}

/* PARALLAX */

.parallax{
width:100vw;
height:120vh;
background-image:url('strona,internetowa.png');
background-size:cover;
background-position:center;
}

.overlay{
position:fixed;
top:100%;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.95);
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
padding:60px 20px;
transition:.8s;
overflow-y:auto;
}

.overlay.active{ top:0;}

footer{
margin-top:50px;
font-size:.6em;
opacity:.6;
}

</style>
</head>
